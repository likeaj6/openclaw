services:
  - type: web
    name: openclaw
    runtime: docker
    plan: standard
    healthCheckPath: /health
    dockerfilePath: ./Dockerfile.render
    # No dockerCommand: defer to Dockerfile.render's CMD so docker-entrypoint.sh
    # actually runs. The entrypoint handles bind-mode selection, host-header
    # origin fallback, schema drift repair (openclaw doctor --fix), and config
    # bootstrap — all of which were silently bypassed while dockerCommand was set.
    envVars:
      - key: SETUP_PASSWORD
        sync: false
      - key: OPENCLAW_GATEWAY_PORT
        value: "8080"
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 1
